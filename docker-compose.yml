services:
  worldcup_bot:
    build:
      # The Dockerfile lives under docker/ to keep the root tidy,
      # but the build context is still the repo root so it can
      # COPY app/ and requirements.txt.
      context: .
      dockerfile: docker/Dockerfile
    # NOTE: no `ports:` block on purpose — the bot uses Telegram's long-polling
    # to receive messages, so it opens an outbound HTTPS connection to
    # api.telegram.org and does NOT need any inbound ports. Safer default.
    env_file:
      - .env
    environment:
      # DB connection — `worldcup_db` is the service name below; docker-compose's
      # built-in DNS resolves it to the MySQL container's internal IP.
      - DB_HOST=worldcup_db
      - DB_PORT=3306
      - DB_NAME=worldcup
      - DB_USER=worldcup
      # DB_PASSWORD, TELEGRAM_BOT_TOKEN, ADMIN_USER_IDS, PLAYERS_PER_LEAGUE
      # all flow in via env_file: .env above.
    depends_on:
      worldcup_db:
        # Wait for MySQL's healthcheck to pass before starting the bot.
        # Without this, the bot would try to connect before MySQL was ready and crash.
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # Heartbeat file the bot touches every minute via a job-queue task.
      # The healthcheck checks the file age — if the bot's polling loop has
      # silently died, the file gets stale and the container restarts.
      - worldcup_bot_state:/app/state
    healthcheck:
      # Pass if the heartbeat file was touched within the last 3 minutes.
      # Bot writes /app/state/heartbeat every 60s via JobQueue.
      test: ["CMD", "python", "-c", "import os, time, sys; p='/app/state/heartbeat'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p) < 180 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ============================================================
  # worldcup_db — MySQL container for league state.
  # Stores leagues, players, picks, matches, point events.
  # ============================================================
  worldcup_db:
    image: mysql:8.0
    restart: unless-stopped
    # NOTE: no `ports:` block on purpose — MySQL is only reachable from
    # other containers on this compose network. It is NOT exposed to the
    # host or the internet. That's the right default for a database.
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: worldcup
      MYSQL_USER: worldcup
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persistent data — survives container rebuilds.
      - worldcup_db_data:/var/lib/mysql
      # Auto-runs on first container start (when volume is empty).
      # On subsequent starts, MySQL sees existing data and skips this.
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >-
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

# ============================================================
# Named volumes — Docker manages these on the host disk.
# They persist across `docker-compose up/down` cycles.
# Only `docker-compose down -v` or explicit `docker volume rm` removes them.
# ============================================================
volumes:
  worldcup_db_data:
    # The MySQL data directory. Tiny — a few MB across the whole tournament.
  worldcup_bot_state:
    # Holds the heartbeat file for the healthcheck (and any future scratch state).
